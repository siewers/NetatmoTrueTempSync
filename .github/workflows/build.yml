name: Build

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: write
  checks: write
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5

      - name: Restore tools
        run: dotnet tool restore

      - name: Build
        run: dotnet build -c Release

      - name: Test
        run: >-
          dotnet test
          -c Release
          --no-build
          --results-directory "${{ github.workspace }}/TestResults"
          --report-trx
          --coverage
          --coverage-output-format cobertura

      - name: Merge code coverage reports
        run: >-
          dotnet coverage merge
          --remove-input-files
          --output "${{ github.workspace }}/TestResults/CoverageReport.cobertura.xml"
          --output-format cobertura
          ${{ github.workspace }}/TestResults/*.cobertura.xml

      - name: Code Coverage Report
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "./TestResults/*.cobertura.xml"
          badge: true
          format: markdown
          output: both
          thresholds: '60 80'

      - name: Add Code Coverage PR Comment
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-results.md

      - name: Publish Test Results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: Test Results
          path: "./TestResults/*.trx"
          reporter: dotnet-trx

      - name: Bump version and push tag
        if: github.ref == 'refs/heads/main'
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ github.token }}
          default_bump: patch

      - name: Publish
        if: steps.tag.outputs.new_tag != ''
        run: >-
          dotnet publish NetatmoTrueTempSync/NetatmoTrueTempSync.csproj
          -c Release
          -r linux-arm64
          -p:SelfContained=true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=true
          -p:AssemblyName=netatmo-truetempsync
          -p:Version=${{ steps.tag.outputs.new_version }}
          -o ${{ github.workspace }}/publish

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ steps.tag.outputs.new_tag }} publish/* --repo ${{ github.repository }} --generate-notes
